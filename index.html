<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#1B6B6F" id="themeColorMeta">
    <meta name="description" content="أثر - تجربة روحانية عربية مع مواقيت صلاة دقيقة، أذكار، وبطاقات يومية فاخرة">
    <title>أثر | Athar</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/faheemappsa/athar/main/icon-192.png">
    
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-H9NQ6TLRS5"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-H9NQ6TLRS5');
    </script>
</head>
<body>
    <div class="app-container" id="appContainer">
        <!-- الهوك العلوي (شعار جذاب) -->
        <div class="hook">
            <p class="hook-line">🕊️ أثرٌ باقٍ، وذكرٌ يُحيي القلوب 🕊️</p>
        </div>

        <!-- قسم الوقت والتاريخ (محسن) -->
        <div class="time-section">
            <div class="current-time" id="currentTime">--:--</div>
            <div class="date-row">
                <span id="hijriDate">-- -- ----</span>
                <span>•</span>
                <span id="gregorianDate" class="gregorian-date">-- -- ----</span>
            </div>
        </div>

        <!-- بطاقة مواقيت الصلاة -->
        <div class="prayer-card" id="prayerCard">
            <div class="next-prayer">
                <span class="prayer-name" id="nextPrayerName">----</span>
                <span class="remaining" id="remainingTime">--:--:--</span>
            </div>
            <div class="iqama" id="iqamaTime">⏱️ وقت الإقامة: --:--</div>
            <button class="location-btn" id="locationBtn">📍 توقيت منطقتي (اضغط للسماح)</button>
            <div class="location-status" id="locationStatus"></div>
        </div>

        <!-- أزرار اختيار نوع المحتوى (أعلى البطاقة) -->
        <div class="content-type-selector">
            <button class="content-type-btn" data-type="ayah">📖 آية قرآنية</button>
            <button class="content-type-btn" data-type="hadith">🕌 حديث نبوي</button>
            <button class="content-type-btn" data-type="dhikr">📿 ذكر</button>
        </div>

        <!-- البطاقة الدينية الفاخرة (المرئية داخل التطبيق) -->
        <div class="share-card" id="shareCard">
            <div class="card-background-selector">
                <span class="bg-label">خلفية البطاقة:</span>
                <button class="bg-option" data-bg="gold">ذهبي</button>
                <button class="bg-option" data-bg="blue">أزرق سماوي</button>
                <button class="bg-option" data-bg="green">أخضر زمردي</button>
            </div>
            <div class="badge" id="cardTypeBadge">آية قرآنية</div>
            <div class="ayat-text" id="cardContent">
                "رَبَّنَا آتِنَا فِي الدُّنْيَا حَسَنَةً"
            </div>
            <div class="card-reference" id="cardReference">البقرة ٢٠١</div>
        </div>

        <!-- زر مشاركة البطاقة -->
        <button class="share-btn" id="shareBtn">📤 مشاركة البطاقة كصورة فاخرة</button>

        <!-- قسم الأذكار والسبحة الرقمية -->
        <div class="dhikr-section">
            <div class="dhikr-row">
                <button class="dhikr-btn" id="morningDhikrBtn">🌅 أذكار الصباح</button>
                <button class="dhikr-btn" id="eveningDhikrBtn">🌙 أذكار المساء</button>
            </div>
            <div class="counter-dhikr">
                <span class="counter-label">🔁 سبحة رقمية:</span>
                <span class="counter-value" id="dhikrCounterValue">0</span>
                <button class="counter-btn" id="dhikrCounterBtn">+1</button>
                <button class="counter-reset" id="dhikrCounterReset">إعادة تعيين</button>
            </div>
        </div>

        <hr />

        <!-- السطر السفلي (الوقف الخيري) -->
        <div class="waqf">
            <p class="waqf-line">وقف خيري عن مسلّم عوده البويني رحمه الله</p>
        </div>

        <!-- زر الوضع الليلي -->
        <div class="dark-mode-toggle">
            <button id="darkModeToggleBtn">🌙 الوضع الليلي</button>
        </div>
    </div>

    <!-- عنصر مخفي لإنشاء بطاقة المشاركة الاحترافية -->
    <div id="exportCardContainer" style="position: absolute; left: -9999px; top: -9999px; z-index: -1;">
        <div id="exportCard" class="export-card">
            <div class="export-header">🕊️ أثر 🕊️</div>
            <div class="export-content" id="exportCardContent">نص البطاقة</div>
            <div class="export-reference" id="exportCardRef">المرجع</div>
            <div class="export-footer">athar-sandy.vercel.app</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
