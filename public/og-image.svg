<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="أثر - وقف خيري">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#F8FFFD"/>
      <stop offset="1" stop-color="#EAF6F3"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#1F7B5F" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1040" cy="88" r="190" fill="#38A47C" opacity="0.08"/>
  <circle cx="135" cy="545" r="220" fill="#38A47C" opacity="0.07"/>
  <rect x="86" y="70" width="1028" height="490" rx="64" fill="#FFFFFF" opacity="0.84" filter="url(#shadow)"/>
  <text x="600" y="165" text-anchor="middle" font-family="Arial, Tahoma, sans-serif" font-size="54" font-weight="700" fill="#38A47C">🌿</text>
  <text x="600" y="235" text-anchor="middle" font-family="Arial, Tahoma, sans-serif" font-size="78" font-weight="800" fill="#244A3F">أثر</text>
  <text x="600" y="305" text-anchor="middle" font-family="Arial, Tahoma, sans-serif" font-size="34" font-weight="700" fill="#244A3F">وقف خيري عن مسلّم عوده البويني رحمه الله</text>
  <text x="600" y="370" text-anchor="middle" font-family="Arial, Tahoma, sans-serif" font-size="30" font-weight="600" fill="#6F8F86">رفيق يومي للأذكار وورد القرآن ومشاركة الأثر</text>
  <text x="600" y="445" text-anchor="middle" font-family="Arial, Tahoma, sans-serif" font-size="32" font-weight="700" fill="#38A47C">لعلنا نكون منهم...</text>
  <text x="600" y="500" text-anchor="middle" font-family="Arial, Tahoma, sans-serif" font-size="34" font-weight="800" fill="#244A3F">﴿ وولدٌ صالحٌ يدعو له ﴾</text>
</svg>
