<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0F111A">
    <meta name="description" content="أثري - لوحة أثرك الشخصي. تتبع انتشار بطاقات العلم النافع.">
    <title>أثري | My Athar</title>
    <link rel="stylesheet" href="https://font.thmanyah.com/Thmanyah.css">
    <style>
        :root {
            --bg-primary: #0F111A;
            --bg-secondary: #1A1E2B;
            --bg-card: #212636;
            --gold: #C9A84C;
            --gold-light: #E8D5A0;
            --text-primary: #FFFFFF;
            --text-secondary: #A9B2C3;
            --text-muted: #6B7280;
            --emerald: #4ADE80;
            --ruby: #F87171;
            --radius-xl: 28px;
            --radius-lg: 20px;
            --radius-md: 14px;
            --radius-sm: 10px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Thmanyah', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 16px;
        }

        .app-shell {
            width: 100%;
            max-width: 500px;
            background: rgba(26, 30, 43, 0.8);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 30px 70px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.05);
            overflow: hidden;
            margin: 0 auto;
        }

        .content-layer {
            padding: 20px;
        }

        /* الهيدر */
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
        }

        .back-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
            color: var(--text-secondary);
            transition: var(--transition);
        }

        .back-btn:hover {
            color: var(--gold);
            border-color: var(--gold);
            background: rgba(255,255,255,0.1);
        }

        .page-title {
            font-size: 24px;
            font-weight: 800;
            color: var(--gold);
            margin: 0 auto;
            text-align: center;
        }

        .header-placeholder {
            width: 44px;
        }

        /* إحصائيات الأثر */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-bottom: 28px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: var(--radius-lg);
            padding: 20px 16px;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 800;
            color: var(--gold);
            line-height: 1.2;
        }

        .stat-label {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .stat-icon {
            font-size: 22px;
        }

        /* شجرة النور */
        .tree-section {
            background: var(--bg-card);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: var(--radius-xl);
            padding: 24px 20px;
            margin-bottom: 28px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--gold-light);
        }

        .tree-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .tree-node {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: var(--radius-sm);
            padding: 10px 16px;
            font-size: 14px;
            color: var(--text-secondary);
            width: fit-content;
            min-width: 180px;
            text-align: center;
            position: relative;
        }

        .tree-node.root {
            background: rgba(201,168,76,0.15);
            border-color: var(--gold);
            color: var(--gold);
            font-weight: 700;
            font-size: 16px;
        }

        .tree-connector {
            width: 2px;
            height: 20px;
            background: linear-gradient(to bottom, var(--gold), transparent);
        }

        .tree-branch {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .tree-node small {
            display: block;
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        /* سجل البطاقات */
        .cards-log {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 28px;
        }

        .log-item {
            background: var(--bg-card);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: var(--radius-md);
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: var(--transition);
        }

        .log-item:hover {
            border-color: rgba(201,168,76,0.3);
        }

        .log-card-preview {
            width: 50px;
            height: 50px;
            background: rgba(201,168,76,0.1);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
        }

        .log-details {
            flex: 1;
        }

        .log-text {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 4px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .log-meta {
            font-size: 12px;
            color: var(--text-muted);
        }

        .log-actions {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            background: rgba(255,255,255,0.05);
            border: none;
            color: var(--text-secondary);
            font-size: 16px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
        }

        .icon-btn:hover {
            background: rgba(255,255,255,0.15);
            color: var(--gold);
        }

        /* شارة الدال على الخير */
        .badge-card {
            background: linear-gradient(135deg, rgba(201,168,76,0.2), rgba(201,168,76,0.05));
            border: 1px solid var(--gold);
            border-radius: var(--radius-lg);
            padding: 20px;
            text-align: center;
            margin-bottom: 28px;
        }

        .badge-icon {
            font-size: 40px;
            margin-bottom: 8px;
        }

        .badge-text {
            font-weight: 700;
            color: var(--gold);
            font-size: 18px;
        }

        .badge-reason {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 6px;
        }

        /* التذييل */
        .footer-note {
            text-align: center;
            font-size: 11px;
            color: var(--text-muted);
            padding: 10px 0;
        }
    </style>
</head>
<body>
    <div class="app-shell">
        <div class="content-layer">
            <!-- الهيدر -->
            <div class="page-header">
                <a href="index.html" class="back-btn" title="الرئيسية">←</a>
                <div class="page-title">أثري</div>
                <div class="header-placeholder"></div>
            </div>

            <!-- الإحصائيات -->
            <div class="stats-grid">
                <div class="stat-card">
                    <span class="stat-icon">✨</span>
                    <span class="stat-value" id="cardsShared">12</span>
                    <span class="stat-label">نور منشور</span>
                </div>
                <div class="stat-card">
                    <span class="stat-icon">❤️</span>
                    <span class="stat-value" id="reachCount">3,450</span>
                    <span class="stat-label">قلوب لامستها</span>
                </div>
                <div class="stat-card">
                    <span class="stat-icon">🤝</span>
                    <span class="stat-value" id="reshared">87</span>
                    <span class="stat-label">أيادٍ شاركت</span>
                </div>
                <div class="stat-card">
                    <span class="stat-icon">🌱</span>
                    <span class="stat-value" id="newUsers">23</span>
                    <span class="stat-label">غرس جديد</span>
                </div>
            </div>

            <!-- شجرة النور -->
            <div class="tree-section">
                <div class="section-title">
                    <span>🌳</span> شجرة نورك
                </div>
                <div class="tree-container">
                    <div class="tree-node root">أنت</div>
                    <div class="tree-connector"></div>
                    <div class="tree-branch">
                        <div class="tree-node">🇸🇦 الرياض <small>12 مشاركة</small></div>
                        <div class="tree-node">🇪🇬 القاهرة <small>8 مشاركات</small></div>
                    </div>
                    <div class="tree-connector"></div>
                    <div class="tree-branch">
                        <div class="tree-node">🇹🇷 إسطنبول <small>5</small></div>
                        <div class="tree-node">🇬🇧 لندن <small>3</small></div>
                        <div class="tree-node">🇲🇾 كوالالمبور <small>2</small></div>
                    </div>
                </div>
            </div>

            <!-- سجل البطاقات -->
            <div class="section-title" style="margin-bottom: 14px;">
                <span>📜</span> سجل بطاقاتك
            </div>
            <div class="cards-log" id="cardsLogContainer">
                <!-- ستملأ بالجافاسكريبت -->
            </div>

            <!-- شارة الدال على الخير -->
            <div class="badge-card">
                <div class="badge-icon">🏅</div>
                <div class="badge-text">الدال على الخير</div>
                <div class="badge-reason">أنت ضمن أكثر 5% نشراً للعلم. أثرك ممتد بإذن الله.</div>
            </div>

            <div class="footer-note">
                © 2024 أثر · وقف خيري عن والدي رحمه الله
            </div>
        </div>
    </div>

    <script>
        (function() {
            // بيانات وهمية (تجربة المستخدم)
            const mockCards = [
                { text: "إذا مات الإنسان انقطع عنه عمله إلا من ثلاث...", ref: "رواه مسلم", date: "قبل 5 دقائق", icon: "📖" },
                { text: "وَمَا أَرْسَلْنَاكَ إِلَّا رَحْمَةً لِّلْعَالَمِينَ", ref: "الأنبياء: 107", date: "أمس", icon: "🕋" },
                { text: "رَبِّ اغْفِرْ لِي وَلِوَالِدَيَّ وَلِمَن دَخَلَ بَيْتِيَ مُؤْمِنًا", ref: "نوح: 28", date: "قبل يومين", icon: "🤲" },
            ];

            const container = document.getElementById('cardsLogContainer');
            mockCards.forEach(card => {
                const div = document.createElement('div');
                div.className = 'log-item';
                div.innerHTML = `
                    <div class="log-card-preview">${card.icon}</div>
                    <div class="log-details">
                        <div class="log-text">${card.text}</div>
                        <div class="log-meta">${card.ref} · ${card.date}</div>
                    </div>
                    <div class="log-actions">
                        <button class="icon-btn" title="مشاركة">↗️</button>
                        <button class="icon-btn" title="إحصائيات">📊</button>
                    </div>
                `;
                container.appendChild(div);
            });

            // الأرقام الإحصائية الوهمية (يمكن جعلها تتصاعد بتأثير عدّاد)
            function animateValue(id, start, end, duration) {
                const obj = document.getElementById(id);
                let startTimestamp = null;
                const step = (timestamp) => {
                    if (!startTimestamp) startTimestamp = timestamp;
                    const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                    obj.innerHTML = Math.floor(progress * (end - start) + start).toLocaleString();
                    if (progress < 1) {
                        window.requestAnimationFrame(step);
                    }
                };
                window.requestAnimationFrame(step);
            }

            // تشغيل العداد عند التحميل
            animateValue('cardsShared', 0, 12, 1000);
            animateValue('reachCount', 0, 3450, 1500);
            animateValue('reshared', 0, 87, 1200);
            animateValue('newUsers', 0, 23, 800);

            console.log('🌿 لوحة أثري جاهزة.');
        })();
    </script>
</body>
</html>
